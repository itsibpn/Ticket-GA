# Nginx Configuration Block - GA Ticket App Production
# Path: /etc/nginx/sites-available/ga-ticket-app

server {
    listen 80;
    listen [::]:80;

    # Ganti dengan domain Anda atau IP Publik Server Ubuntu
    server_name gaticket.co.id www.gaticket.co.id;

    # Logger paths
    access_log /var/log/nginx/ga_ticket_access.log;
    error_log /var/log/nginx/ga_ticket_error.log;

    # 1. FRONTEND: Serve React static files compiled from npm run build
    location / {
        root /var/www/ga-ticket-app/frontend/dist;
        index index.html index.htm;
        try_files $uri $uri/ /index.html; # fallback to index.html for React Router SPA
        
        # Cache static files strongly for performance
        location ~* \.(?:css|js|woff2?|svg|gif|png|jpe?g|webp)$ {
            expires 30d;
            add_header Cache-Control "public, no-transform";
        }
    }

    # 2. BACKEND API: Reverse proxy requests matching /api to Express Server running on port 5000
    location /api {
        proxy_pass http://127.0.0.1:5000;
        proxy_http_version 1.1;
        
        # Web socket and header proxies
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
        
        # Secure headers forwarded to backend
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
